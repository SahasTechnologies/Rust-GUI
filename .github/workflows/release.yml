name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: pomodoro-linux
          - os: windows-latest
            artifact_name: pomodoro-windows.exe
          - os: macos-latest
            artifact_name: pomodoro-macos

    defaults:
      run:
        working-directory: todo_app

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: todo_app

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwayland-dev libxkbcommon-dev libasound2-dev

      - name: Build Release
        run: cargo build --release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p ./out
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/release/pomodoro_app.exe ./out/${{ matrix.artifact_name }}
          else
            cp target/release/pomodoro_app ./out/${{ matrix.artifact_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: todo_app/out/${{ matrix.artifact_name }}

  build-wasm:
    name: Build WASM (GitHub Pages)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: todo_app
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (WASM target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Build WASM
        run: trunk build --release --public-url ./

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-site
          path: todo_app/dist

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-native, build-wasm]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy WASM to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - name: Download WASM Artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-site
          path: ./public

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy
        uses: actions/deploy-pages@v4
