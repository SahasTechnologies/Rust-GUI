<!DOCTYPE html>
<html>
<meta http-equiv="Content-type" content="text/html; charset=utf-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

<head>
    <title>Pomodoro Timer</title>
    <link data-trunk rel="rust" data-bin="pomodoro_app" />
    
    <style>
        html {
            /* Remove touch delay: */
            touch-action: manipulation;
        }

        body {
            /* Light mode / dark mode background fix */
            background: #111111;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* This centers the canvas where the app lives */
        canvas {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 0%;
            left: 50%;
            transform: translate(-50%, 0%);
            width: 100%;
            height: 100%;
        }
    </style>
</head>

</html>
